<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="800" height="600">
  <!-- Red de Nodos (Estilo Git Branch / Flow) -->
  <g transform="translate(0, 10)">
      <!-- Línea principal (Backbone) -->
      <path d="M 120 100 L 280 100" fill="none" stroke="#1f2937" stroke-width="6" stroke-linecap="round" />
      
      <!-- Línea de rama (Feature/Dev branch) -->
      <path d="M 160 100 L 195 55 L 245 55 L 280 100" fill="none" stroke="#00C4CC" stroke-width="6" stroke-linejoin="round" />
      
      <!-- Nodos de la línea principal -->
      <circle cx="120" cy="100" r="8" fill="#1f2937" />
      <circle cx="160" cy="100" r="8" fill="#1f2937" />
      
      <!-- Nodos de la rama tecnológica -->
      <circle cx="195" cy="55" r="8" fill="#00C4CC" />
      <circle cx="245" cy="55" r="8" fill="#00C4CC" />
      <circle cx="280" cy="100" r="8" fill="#00C4CC" />
  </g>
  
  <!-- Texto principal -->
  <text x="200" y="195" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="46" font-weight="800" fill="#1f2937" text-anchor="middle" letter-spacing="-1">mjlucero</text>
  
  <!-- Subtítulo / Tagline -->
  <text x="200" y="230" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="700" fill="#00C4CC" letter-spacing="4" text-anchor="middle">WEB DEV</text>
</svg>